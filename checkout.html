<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <title>PitsiShop | Your Bag</title>
</head>
<body>
    <nav>
        <a href="index.html" style="color:white; font-weight:bold; text-decoration:none; font-size:1.5rem; letter-spacing:4px;">PITSISHOP</a>
        <div class="nav-links">
            <a href="index.html" class="nav-btn">Home</a>
            <a href="products.html" class="nav-btn">Shop All</a>
            <a href="about.html" class="nav-btn">Our Story</a>
            <a href="checkout.html" class="nav-btn">My Bag <span id="cart-num">0</span></a>
        </div>
    </nav>

    <div class="container" style="margin-top: 50px;">
        <h2 class="section-title">Review Your Selection</h2>
        
        <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 40px; align-items: start;">
            <!-- Left Side: Items -->
            <div id="checkout-container"></div>

            <!-- Right Side: Order Summary Card -->
            <div style="background: white; padding: 2rem; border: 1px solid #eee; position: sticky; top: 100px;">
                <h3 style="font-family: 'Playfair Display'; border-bottom: 1px solid #eee; padding-bottom: 1rem;">Summary</h3>
                <div style="display: flex; justify-content: space-between; margin: 1.5rem 0;">
                    <span>Subtotal</span>
                    <span id="subtotal">$0</span>
                </div>
                <div style="display: flex; justify-content: space-between; margin-bottom: 1.5rem; color: #888;">
                    <span>Market Shipping</span>
                    <span>Calculated at next step</span>
                </div>
                <div style="display: flex; justify-content: space-between; font-weight: bold; font-size: 1.2rem; border-top: 1px solid #eee; padding-top: 1.5rem;">
                    <span>Total</span>
                    <span id="total-price">$0</span>
                </div>
                <button onclick="location.href='payment.html'" class="btn-add" style="margin-top: 2rem;">Proceed to Payment</button>
            </div>
        </div>
    </div>

    <script src="cart.js"></script>
    <script>
        function renderCheckout() {
            const container = document.getElementById('checkout-container');
            const totalEl = document.getElementById('total-price');
            const subtotalEl = document.getElementById('subtotal');
            let total = 0;
            container.innerHTML = "";

            if(cart.length === 0) {
                container.innerHTML = "<div style='text-align:center; padding: 3rem;'><h3>Your bag is empty</h3><a href='products.html' style='color: var(--gold-accent);'>Continue Shopping</a></div>";
                return;
            }

            cart.forEach(item => {
                total += item.price * item.quantity;
                container.innerHTML += `
                    <div class="cart-item" style="border: none; border-bottom: 1px solid #eee; border-radius: 0; padding: 2rem 0;">
                        <div style="display:flex; align-items:center; gap:25px;">
                            <img src="${item.img}" style="width:100px; height:120px; object-fit:cover;">
                            <div>
                                <strong style="font-size:1.1rem;">${item.name}</strong><br>
                                <small style="color: #888;">$${item.price} per unit</small>
                            </div>
                        </div>
                        <div class="qty-control" style="gap: 15px;">
                            <div style="display: flex; align-items: center; border: 1px solid #ddd;">
                                <button class="qty-btn" onclick="minusFromCart(${item.id})" style="border:none; background:none;">-</button>
                                <input type="number" class="qty-input" value="${item.quantity}" readonly style="border:none; width: 30px;">
                                <button class="qty-btn" onclick="addToCart(${item.id})" style="border:none; background:none;">+</button>
                            </div>
                            <button onclick="removeFromCart(${item.id})" style="background:none; border:none; color:#ff5252; cursor:pointer; font-size:0.8rem; text-transform:uppercase; letter-spacing:1px;">Remove</button>
                        </div>
                        <div style="font-weight: bold; min-width: 80px; text-align: right;">
                            $${item.price * item.quantity}
                        </div>
                    </div>
                `;
            });
            totalEl.innerText = "$" + total;
            subtotalEl.innerText = "$" + total;
        }
        renderCheckout();
    </script>
</body>
</html>
