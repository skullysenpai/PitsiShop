<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <title>PitsiShop | Secure Checkout</title>
</head>
<body>
    <nav>
        <a href="index.html" style="color:white; font-weight:bold; text-decoration:none; font-size:1.5rem; letter-spacing:4px;">PITSISHOP</a>
    </nav>

    <div class="container" style="max-width: 800px; margin-top: 50px;">
        <h2 class="section-title">Secure Checkout</h2>
        
        <form onsubmit="alert('Thank you for your PitsiShop order!'); localStorage.clear(); location.href='index.html'; return false;">
            <!-- Shipping Info -->
            <div style="background: white; padding: 2rem; margin-bottom: 2rem; border: 1px solid #eee;">
                <h3 style="font-family: 'Playfair Display'; margin-bottom: 1.5rem;">1. Shipping Address</h3>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <input type="text" placeholder="First Name" required style="padding:12px; border:1px solid #ddd;">
                    <input type="text" placeholder="Last Name" required style="padding:12px; border:1px solid #ddd;">
                    <input type="text" placeholder="Address" required style="grid-column: span 2; padding:12px; border:1px solid #ddd;">
                    <input type="text" placeholder="City" required style="padding:12px; border:1px solid #ddd;">
                    <input type="text" placeholder="ZIP Code" required style="padding:12px; border:1px solid #ddd;">
                </div>
            </div>

            <!-- Payment Info -->
            <div style="background: white; padding: 2rem; border: 1px solid #eee;">
                <h3 style="font-family: 'Playfair Display'; margin-bottom: 1.5rem;">2. Payment Method</h3>
                <div style="margin-bottom: 20px;">
                    <label style="margin-right: 20px;"><input type="radio" name="pay" checked> Credit Card</label>
                    <label><input type="radio" name="pay"> PayPal</label>
                </div>
                <input type="text" placeholder="Card Number" required style="width:100%; padding:12px; border:1px solid #ddd; margin-bottom: 15px;">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <input type="text" placeholder="MM/YY" required style="padding:12px; border:1px solid #ddd;">
                    <input type="text" placeholder="CVV" required style="padding:12px; border:1px solid #ddd;">
                </div>
            </div>

            <button type="submit" class="btn-add" style="margin-top: 2rem; padding: 20px;">Authorize & Pay</button>
            <p style="text-align: center; color: #888; font-size: 0.8rem; margin-top: 1rem;">🔒 Encrypted Secure Checkout</p>
        </form>
    </div>
    
    <script src="cart.js"></script>
</body>
</html>
